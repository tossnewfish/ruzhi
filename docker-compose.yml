services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: onboarding-springboot-demo:latest
    container_name: onboarding-springboot-demo
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_OPTS: "-Xms256m -Xmx512m"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rocketmq-namesrv:
        condition: service_started
      rocketmq-broker:
        condition: service_started
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: onboarding-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: onboarding
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    container_name: onboarding-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  rocketmq-namesrv:
    image: apache/rocketmq:5.3.0
    container_name: onboarding-rocketmq-namesrv
    command: sh mqnamesrv
    ports:
      - "9876:9876"
    restart: unless-stopped

  rocketmq-broker:
    image: apache/rocketmq:5.3.0
    container_name: onboarding-rocketmq-broker
    command: sh mqbroker -n rocketmq-namesrv:9876
    ports:
      - "10909:10909"
      - "10911:10911"
    depends_on:
      rocketmq-namesrv:
        condition: service_started
    restart: unless-stopped

volumes:
  mysql_data:
